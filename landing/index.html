<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity | Clean Video Editing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">VELOCITY.</div>
    </nav>

    <main class="hero">
        <div class="content">
            <h1>A edição de vídeo<br>encontrou a velocidade.</h1>
            <p>Clean. Direto ao ponto. Focado no essencial.</p>
            
            <!-- Substitua o href pelo link da sua release no GitHub -->
            <a href="https://github.com/SEU_USUARIO/SEU_REPO/releases/latest/download/velocity.exe" class="cta-button" id="download-btn">
                Baixar para Windows (.exe)
            </a>
        </div>

        <!-- Chão e Animação do bonequinho correndo -->
        <div class="runner-container">
            <svg class="runner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <!-- Cabeça -->
                <circle cx="14" cy="5" r="2"></circle>
                <!-- Corpo e braços -->
                <path d="M14 7l-2 5"></path>
                <path d="M10 9l2-2 4 1 2-2"></path>
                <!-- Pernas correndo -->
                <path d="M12 12l2 4 3-1"></path>
                <path d="M12 12l-3 2v4"></path>
                
                <!-- Linhas de velocidade (Speed lines) -->
                <path class="speed-line sl-1" d="M2 12h4"></path>
                <path class="speed-line sl-2" d="M4 16h5"></path>
                <path class="speed-line sl-3" d="M3 8h3"></path>
            </svg>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
